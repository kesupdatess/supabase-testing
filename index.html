<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>KES Updates - Admin Hub</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
  body {
    min-height: 100vh;
    background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    padding: 20px;
    color: #fff;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  header {
    text-align: center;
    padding: 30px 20px;
    margin-bottom: 30px;
  }
  header h1 {
    font-size: 2.5rem;
    margin-bottom: 10px;
    text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
  }
  header p { font-size: 1.1rem; opacity: 0.9; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 20px;
  }
  .card {
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 16px;
    padding: 25px;
    text-decoration: none;
    color: #fff;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    cursor: pointer;
  }
  .card:hover {
    transform: translateY(-8px);
    background: rgba(255,255,255,0.25);
    box-shadow: 0 15px 35px rgba(0,0,0,0.3);
  }
  .icon {
    font-size: 3rem;
    margin-bottom: 15px;
    background: rgba(255,255,255,0.2);
    width: 80px;
    height: 80px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .card h3 { font-size: 1.3rem; margin-bottom: 8px; }
  .card p { font-size: 0.9rem; opacity: 0.85; margin-bottom: 15px; }
  .btn {
    background: #fff;
    color: #764ba2;
    padding: 8px 20px;
    border-radius: 20px;
    font-weight: 600;
    font-size: 0.85rem;
    margin-top: auto;
  }
  footer {
    text-align: center;
    margin-top: 40px;
    padding: 20px;
    opacity: 0.8;
    font-size: 0.9rem;
  }
  @media (max-width: 600px) {
    header h1 { font-size: 1.8rem; }
    .icon { width: 65px; height: 65px; font-size: 2.2rem; }
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>🎓 KES Updates Admin Hub</h1>
      <p>One place to manage everything</p>
    </header>

    <div class="grid">
      <a href="https://kesupdatess.github.io/kes-Updatess/" target="_blank" class="card">
        <div class="icon">🌐</div>
        <h3>Main Website</h3>
        <p>Student chatbot & portal</p>
        <div class="btn">Open →</div>
      </a>

      <a href="https://kesupdatess.github.io/KES-UPDATESS-FOUNDATION/" target="_blank" class="card">
        <div class="icon">💝</div>
        <h3>Donation Portal</h3>
        <p>Public donation page</p>
        <div class="btn">Open →</div>
      </a>

      <a href="https://kesupdatess.github.io/ADMIN-PANEL-DONATION/" target="_blank" class="card">
        <div class="icon">💰</div>
        <h3>Donation Admin</h3>
        <p>Manage payments & donors</p>
        <div class="btn">Open →</div>
      </a>

      <a href="https://kesupdatess.github.io/ADMIN-PANNEL-FOR-NOTICES-/" target="_blank" class="card">
        <div class="icon">📢</div>
        <h3>Notice Admin</h3>
        <p>Post & manage notices</p>
        <div class="btn">Open →</div>
      </a>
    </div>

    <footer>
      © 2026 KES Shroff College • Admin Hub v1.0
    </footer>
  </div>
</body>
</html>
